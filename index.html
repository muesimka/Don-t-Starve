<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="favicon.ico">
        <title>Don't Starve Clone</title>
        <style>
            body {
                margin: 0;
                padding: 20px;
                background: #1a1a2e;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                font-family: monospace;
            }
            canvas {
                border: 2px solid #4a4a6a;
                border-radius: 4px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            }
        </style>
    </head>
    <body>
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <!-- Скрытые элементы для предзагрузки -->
        <div style="display:none;">
            <img id="testImage" src="assets/images/placeholder.png" alt="placeholder">
            <audio id="testSound" src="assets/audio/sounds/click.mp3" preload="auto"></audio>
        </div>

        <!-- Конфигурация -->
        <script src="js/config/config.js"></script>
        <script src="js/config/balance.js"></script>
        
        <!-- Состояние -->
        <script src="js/state/state.js"></script>
        
        <!-- Графика -->
        <script src="js/graphics/assets.js"></script>
        <script src="js/graphics/camera.js"></script>
        <script src="js/graphics/renderer.js"></script>
        
        <!-- Аудио -->
        <script src="js/audio/sound.js"></script>
        <script src="js/audio/effects.js"></script>
        
        <!-- UI -->
        <script src="js/ui/input.js"></script>
        
        <!-- Ядро -->
        <script src="js/core/ai.js"></script>
        <script src="js/core/core.js"></script>
        
        <!-- Главный файл -->
        <script src="js/main.js"></script>
        
        <!-- Тесты -->
        <script src="js/tests/qa.js"></script>
    </body>
</html>
